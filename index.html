<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neon Snake Remix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Courier New',monospace;color:#fff;touch-action:none}
#wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%}
canvas{display:block;image-rendering:pixelated}
#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:20px;font-size:16px;text-shadow:0 0 8px #0ff,0 0 16px #0ff;z-index:10}
#hud span{color:#0ff}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,.85);z-index:20;text-align:center}
#overlay h1{font-size:clamp(28px,6vw,56px);color:#f0f;text-shadow:0 0 20px #f0f,0 0 40px #f0f;margin-bottom:10px}
#overlay h2{font-size:clamp(16px,3vw,28px);color:#0ff;text-shadow:0 0 10px #0ff;margin-bottom:20px}
#overlay .sub{color:#888;font-size:14px;margin-top:8px}
#overlay .btn{display:inline-block;margin-top:18px;padding:12px 32px;font-size:20px;font-family:inherit;color:#0a0a1a;background:linear-gradient(135deg,#0ff,#f0f);border:none;cursor:pointer;text-transform:uppercase;letter-spacing:2px;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
#powerup-bar{position:absolute;top:36px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.pu-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.7}
.pu-icon.active{opacity:1;box-shadow:0 0 8px currentColor}
</style>
</head>
<body>
<div id="wrap">
<div id="hud"><span id="score-display">Score: 0</span><span id="hi-display">Hi: 0</span></div>
<div id="powerup-bar"></div>
<canvas id="c"></canvas>
<div id="overlay">
<h1>🐍 NEON SNAKE REMIX</h1>
<h2>Synthwave Edition</h2>
<button class="btn" id="start-btn">START</button>
<div class="sub">Arrow/WASD or Swipe</div>
</div>
</div>
<script>
// ─── Constants ───
const GRID = 20;
const BASE_SPEED = 150;
const MIN_SPEED = 60;
const SPEED_RAMP = 1.5; // ms faster per food eaten

// ─── DOM ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score-display');
const hiEl = document.getElementById('hi-display');
const startBtn = document.getElementById('start-btn');
const puBar = document.getElementById('powerup-bar');

// ─── State ───
let cols, rows, cellSize;
let snake, dir, nextDir, food, powerups, activePU, portals;
let score, hiScore, speed, alive, paused, gameLoop;
let trailCanvas, trailCtx;
let gridPhase = 0;
let audioCtx, musicGain, started = false;

// ─── Audio ───
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.12;
  musicGain.connect(audioCtx.destination);
  startMusic();
}

function playTone(freq, dur, type='square', vol=0.15, detune=0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  o.detune.value = detune;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxEat() { playTone(880, 0.1, 'square', 0.2); playTone(1320, 0.12, 'square', 0.15); }
function sfxPowerup() { playTone(523, 0.08, 'sawtooth', 0.2); playTone(784, 0.1, 'sawtooth', 0.2); playTone(1047, 0.15, 'sawtooth', 0.18); }
function sfxDeath() {
  playTone(200, 0.4, 'sawtooth', 0.3);
  playTone(150, 0.5, 'sawtooth', 0.25);
  playTone(80, 0.6, 'square', 0.2);
}

// Procedural synthwave music
let musicInterval;
function startMusic() {
  const notes = [130.81,146.83,164.81,174.61,196.00,220.00,246.94,261.63];
  const arpNotes = [261.63,329.63,392.00,523.25,659.25,783.99];
  let step = 0;
  const play = () => {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Bass
    const bassO = audioCtx.createOscillator();
    const bassG = audioCtx.createGain();
    bassO.type = 'sawtooth';
    bassO.frequency.value = notes[step % notes.length];
    bassG.gain.setValueAtTime(0.08, t);
    bassG.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    bassO.connect(bassG); bassG.connect(musicGain);
    bassO.start(t); bassO.stop(t + 0.3);
    // Arp
    for (let i = 0; i < 4; i++) {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.value = arpNotes[(step * 3 + i) % arpNotes.length];
      g.gain.setValueAtTime(0.04, t + i * 0.075);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.075 + 0.12);
      o.connect(g); g.connect(musicGain);
      o.start(t + i * 0.075); o.stop(t + i * 0.075 + 0.15);
    }
    step++;
  };
  musicInterval = setInterval(play, 320);
}

// ─── Sizing ───
function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 50;
  cellSize = Math.max(12, Math.min(28, Math.floor(Math.min(maxW, maxH) / GRID)));
  cols = Math.floor(maxW / cellSize);
  rows = Math.floor(maxH / cellSize);
  if (cols < 10) cols = 10;
  if (rows < 10) rows = 10;
  canvas.width = cols * cellSize;
  canvas.height = rows * cellSize;
  // Trail layer
  if (!trailCanvas) { trailCanvas = document.createElement('canvas'); trailCtx = trailCanvas.getContext('2d'); }
  trailCanvas.width = canvas.width;
  trailCanvas.height = canvas.height;
}
window.addEventListener('resize', () => { resize(); });

// ─── Powerup defs ───
const PU_TYPES = [
  { id:'speed', emoji:'⚡', color:'#ff0', dur:5000, desc:'Speed Boost' },
  { id:'slow', emoji:'🐢', color:'#0f0', dur:5000, desc:'Slow-Mo' },
  { id:'portal', emoji:'🌀', color:'#f0f', dur:0, desc:'Portal' },
  { id:'shield', emoji:'🛡️', color:'#08f', dur:15000, desc:'Shield' },
  { id:'magnet', emoji:'🧲', color:'#f80', dur:6000, desc:'Magnet' },
  { id:'shrink', emoji:'✂️', color:'#f44', dur:0, desc:'Shrink' },
];

function randCell() { return { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) }; }
function cellOccupied(c) {
  return snake.some(s => s.x === c.x && s.y === c.y) ||
    (food && food.x === c.x && food.y === c.y) ||
    powerups.some(p => p.x === c.x && p.y === c.y) ||
    portals.some(p => p.x === c.x && p.y === c.y);
}
function freeCell() { let c; do { c = randCell(); } while (cellOccupied(c)); return c; }

function spawnFood() { food = freeCell(); }
function maybeSpawnPowerup() {
  if (powerups.length >= 2 || Math.random() > 0.35) return;
  const t = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
  const c = freeCell();
  powerups.push({ ...c, type: t, timer: 300 }); // disappears after 300 ticks
}

// ─── Game init ───
function initGame() {
  const cx = Math.floor(cols / 2), cy = Math.floor(rows / 2);
  snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
  dir = { x: 1, y: 0 };
  nextDir = { ...dir };
  food = null; powerups = []; activePU = {}; portals = [];
  score = 0; speed = BASE_SPEED; alive = true;
  spawnFood();
  trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  updateHUD();
}

function updateHUD() {
  scoreEl.textContent = 'Score: ' + score;
  hiScore = Math.max(score, parseInt(localStorage.getItem('neonsnake_hi') || '0'));
  localStorage.setItem('neonsnake_hi', hiScore);
  hiEl.textContent = 'Hi: ' + hiScore;
  // Powerup bar
  let html = '';
  for (const [id, info] of Object.entries(activePU)) {
    const t = PU_TYPES.find(p => p.id === id);
    if (t) html += `<div class="pu-icon active" style="color:${t.color};border:1px solid ${t.color}">${t.emoji}</div>`;
  }
  puBar.innerHTML = html;
}

// ─── Tick ───
function tick() {
  if (!alive) return;
  dir = { ...nextDir };

  // Magnet: move food toward head
  if (activePU.magnet && food) {
    const head = snake[0];
    if (food.x < head.x) food.x++;
    else if (food.x > head.x) food.x--;
    if (food.y < head.y) food.y++;
    else if (food.y > head.y) food.y--;
  }

  let nx = snake[0].x + dir.x;
  let ny = snake[0].y + dir.y;

  // Portal check
  for (let i = 0; i < portals.length; i += 2) {
    if (i + 1 >= portals.length) break;
    const a = portals[i], b = portals[i + 1];
    if (nx === a.x && ny === a.y) { nx = b.x + dir.x; ny = b.y + dir.y; break; }
    if (nx === b.x && ny === b.y) { nx = a.x + dir.x; ny = a.y + dir.y; break; }
  }

  // Wall collision
  if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) {
    if (activePU.shield) { delete activePU.shield; nx = Math.max(0, Math.min(cols - 1, nx)); ny = Math.max(0, Math.min(rows - 1, ny)); }
    else { die(); return; }
  }

  // Self collision
  if (snake.some(s => s.x === nx && s.y === ny)) {
    if (activePU.shield) { delete activePU.shield; }
    else { die(); return; }
  }

  // Move
  const newHead = { x: nx, y: ny };
  snake.unshift(newHead);

  // Draw trail
  trailCtx.fillStyle = activePU.speed ? 'rgba(255,255,0,0.5)' : activePU.shield ? 'rgba(0,136,255,0.4)' : 'rgba(0,255,255,0.35)';
  trailCtx.fillRect(nx * cellSize + 2, ny * cellSize + 2, cellSize - 4, cellSize - 4);

  // Eat food
  let ate = false;
  if (food && nx === food.x && ny === food.y) {
    ate = true;
    score += 10;
    speed = Math.max(MIN_SPEED, speed - SPEED_RAMP);
    sfxEat();
    spawnFood();
    maybeSpawnPowerup();
    restartLoop();
  }
  if (!ate) snake.pop();

  // Pickup powerup
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (p.x === nx && p.y === ny) {
      sfxPowerup();
      applyPowerup(p.type);
      powerups.splice(i, 1);
    } else {
      p.timer--;
      if (p.timer <= 0) powerups.splice(i, 1);
    }
  }

  // Decay active PU timers
  for (const id of Object.keys(activePU)) {
    activePU[id] -= speed;
    if (activePU[id] <= 0) {
      delete activePU[id];
      if (id === 'speed' || id === 'slow') { speed = Math.max(MIN_SPEED, BASE_SPEED - score * SPEED_RAMP / 10); restartLoop(); }
    }
  }

  updateHUD();
}

function applyPowerup(t) {
  switch (t.id) {
    case 'speed': activePU.speed = t.dur; speed = Math.max(MIN_SPEED, speed * 0.5); restartLoop(); break;
    case 'slow': activePU.slow = t.dur; speed = Math.min(BASE_SPEED * 1.5, speed * 1.8); restartLoop(); break;
    case 'shield': activePU.shield = t.dur; break;
    case 'magnet': activePU.magnet = t.dur; break;
    case 'portal':
      const a = freeCell(), b = freeCell();
      portals.push(a, b);
      setTimeout(() => { portals = portals.filter(p => p !== a && p !== b); }, 12000);
      break;
    case 'shrink':
      const cut = Math.max(3, snake.length - 4);
      while (snake.length > cut) snake.pop();
      break;
  }
}

function die() {
  alive = false;
  sfxDeath();
  clearInterval(gameLoop);
  setTimeout(showDeath, 400);
}

function showDeath() {
  overlay.innerHTML = `<h1>GAME OVER</h1><h2>Score: ${score}</h2><button class="btn" id="start-btn">RETRY</button><div class="sub">Arrow/WASD or Swipe</div>`;
  overlay.style.display = 'flex';
  overlay.querySelector('.btn').addEventListener('click', startGame);
}

function restartLoop() {
  clearInterval(gameLoop);
  const s = activePU.speed ? speed : activePU.slow ? speed : speed;
  gameLoop = setInterval(tick, s);
}

// ─── Rendering ───
function draw() {
  // Fade trail
  trailCtx.fillStyle = 'rgba(10,10,26,0.04)';
  trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Synthwave grid background
  gridPhase += 0.015;
  const pulse = 0.15 + 0.08 * Math.sin(gridPhase * 2);
  ctx.strokeStyle = `rgba(255,0,255,${pulse})`;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= cols; x++) { ctx.beginPath(); ctx.moveTo(x * cellSize, 0); ctx.lineTo(x * cellSize, canvas.height); ctx.stroke(); }
  for (let y = 0; y <= rows; y++) { ctx.beginPath(); ctx.moveTo(0, y * cellSize); ctx.lineTo(canvas.width, y * cellSize); ctx.stroke(); }

  // Draw trail layer
  ctx.drawImage(trailCanvas, 0, 0);

  // Portals
  for (let i = 0; i < portals.length; i++) {
    const p = portals[i];
    ctx.save();
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 12 + 4 * Math.sin(gridPhase * 4);
    ctx.fillStyle = '#f0f';
    ctx.beginPath();
    ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize / 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Food
  if (food) {
    ctx.save();
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 14 + 6 * Math.sin(gridPhase * 5);
    ctx.fillStyle = '#f44';
    ctx.beginPath();
    ctx.arc(food.x * cellSize + cellSize / 2, food.y * cellSize + cellSize / 2, cellSize / 2.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Powerups on map
  for (const p of powerups) {
    ctx.save();
    ctx.shadowColor = p.type.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.type.color;
    ctx.font = `${cellSize - 4}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type.emoji, p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2);
    ctx.restore();
  }

  // Snake
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const ratio = 1 - i / snake.length;
    const hue = (180 + i * 4 + gridPhase * 30) % 360;
    ctx.save();
    if (i === 0) {
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#fff';
    } else {
      ctx.shadowColor = `hsl(${hue},100%,60%)`;
      ctx.shadowBlur = 8 + 6 * ratio;
      ctx.fillStyle = `hsl(${hue},100%,55%)`;
    }
    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(s.x * cellSize + pad, s.y * cellSize + pad, cellSize - pad * 2, cellSize - pad * 2);
    ctx.restore();
  }

  // Shield indicator
  if (activePU.shield) {
    const h = snake[0];
    ctx.save();
    ctx.strokeStyle = 'rgba(0,136,255,0.6)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#08f';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(h.x * cellSize + cellSize / 2, h.y * cellSize + cellSize / 2, cellSize * 0.8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  requestAnimationFrame(draw);
}

// ─── Controls ───
function setDir(x, y) {
  if (x !== 0 && dir.x === 0) nextDir = { x, y: 0 };
  else if (y !== 0 && dir.y === 0) nextDir = { x: 0, y };
}

document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': setDir(0, -1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': setDir(0, 1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': setDir(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': setDir(1, 0); e.preventDefault(); break;
  }
});

// Touch/swipe
let touchStart = null;
document.addEventListener('touchstart', e => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }, { passive: true });
document.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) + Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
  touchStart = null;
});

// ─── Start ───
function startGame() {
  initAudio();
  overlay.style.display = 'none';
  resize();
  initGame();
  restartLoop();
}

resize();
hiScore = parseInt(localStorage.getItem('neonsnake_hi') || '0');
hiEl.textContent = 'Hi: ' + hiScore;
startBtn.addEventListener('click', startGame);
requestAnimationFrame(draw);
</script>
</body>
</html>
